<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NestCharge</title>
  <meta name="color-scheme" content="dark" />
  <style>
    html,body{background:#070c1a;color:#dde3f0;font-family:sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;margin:0;text-align:center}
    .spinner{width:44px;height:44px;border:3px solid rgba(0,212,148,0.2);border-top-color:#00d494;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1.5rem}
    @keyframes spin{to{transform:rotate(360deg)}}
    h2{font-size:1.3rem;margin-bottom:0.5rem}
    p{color:#8e9ab0;font-size:0.9rem}
  </style>
</head>
<body>
  <div>
    <div class="spinner"></div>
    <h2>Signing you in…</h2>
    <p>Just a moment</p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    var sb = supabase.createClient(
      'https://ovhezomrlrfajrmwbdya.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92aGV6b21ybHJmYWpybXdiZHlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NjM1MzEsImV4cCI6MjA4NzUzOTUzMX0.UTFUvtMKkyIIdJrc0GewWyTzAtONymUqZo_jJtT2ONI'
    );

    var gone = false;

    function redirect(user) {
      if (gone) return;
      gone = true;
      var role = ((user && user.user_metadata) || {}).role || 'driver';
      var admins = ['hello@nestcharge.co.uk', 'admin@nestcharge.co.uk'];
      if (admins.indexOf(user.email) > -1) {
        window.location.replace('admin.html');
      } else if (role === 'host') {
        window.location.replace('host-dashboard.html');
      } else {
        window.location.replace('bookings.html');
      }
    }

    // Method 1: onAuthStateChange — fires when Supabase parses the URL hash token
    sb.auth.onAuthStateChange(function(event, session) {
      if (session && session.user) {
        redirect(session.user);
      }
    });

    // Method 2: Poll getSession every 500ms for up to 15 seconds
    var attempts = 0;
    var poll = setInterval(async function() {
      attempts++;
      var result = await sb.auth.getSession();
      if (result.data && result.data.session) {
        clearInterval(poll);
        redirect(result.data.session.user);
      }
      if (attempts >= 30) {
        clearInterval(poll);
        if (!gone) window.location.replace('auth.html');
      }
    }, 500);
  </script>
</body>
</html>
