.page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1.25rem;
}

.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.5rem;
  color: #dde3f0;
  margin-bottom: 2rem;
  text-align: center;
}
.logo em { color: #00d494; font-style: normal; }

.card {
  width: 100%;
  max-width: 400px;
  background: #111b2e;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 1.5rem;
  padding: 2rem 1.5rem;
}

.tabs {
  display: flex;
  background: #0d1428;
  border-radius: 100px;
  padding: 3px;
  margin-bottom: 1.75rem;
}
.tab {
  flex: 1;
  padding: 0.55rem;
  border-radius: 100px;
  border: none;
  background: transparent;
  color: #8e9ab0;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.88rem;
  cursor: pointer;
  transition: all 0.2s;
}
.tab.active {
  background: #00d494;
  color: #000;
  font-weight: 600;
}

.form-group { margin-bottom: 1rem; }
label {
  display: block;
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: #8e9ab0;
  margin-bottom: 0.4rem;
}
input {
  width: 100%;
  background: #0d1428;
  border: 1px solid rgba(255,255,255,0.1);
  color: #dde3f0;
  padding: 0.825rem 1rem;
  border-radius: 0.875rem;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
input:focus { border-color: rgba(0,212,148,0.5); }
input::placeholder { color: #4a5568; }

.role-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.625rem;
  margin-bottom: 1rem;
}
.role-btn {
  padding: 0.75rem;
  border-radius: 0.875rem;
  border: 1px solid rgba(255,255,255,0.08);
  background: #0d1428;
  color: #8e9ab0;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
}
.role-btn.selected {
  border-color: rgba(0,212,148,0.4);
  background: rgba(0,212,148,0.08);
  color: #00d494;
}

.btn-main {
  width: 100%;
  background: #00d494;
  color: #000;
  border: none;
  padding: 0.925rem;
  border-radius: 0.875rem;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  cursor: pointer;
  margin-top: 0.5rem;
  transition: opacity 0.2s;
}
.btn-main:hover { opacity: 0.88; }
.btn-main:disabled { opacity: 0.5; cursor: not-allowed; }

.divider {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin: 1.25rem 0;
  color: #4a5568;
  font-size: 0.8rem;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(255,255,255,0.07);
}

.btn-google {
  width: 100%;
  background: #fff;
  color: #111;
  border: none;
  padding: 0.875rem;
  border-radius: 0.875rem;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  font-size: 0.92rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.625rem;
  transition: opacity 0.2s;
}
.btn-google:hover { opacity: 0.92; }

.error-msg {
  background: rgba(255,94,125,0.1);
  border: 1px solid rgba(255,94,125,0.25);
  color: #ff5e7d;
  padding: 0.75rem 1rem;
  border-radius: 0.75rem;
  font-size: 0.83rem;
  margin-bottom: 1rem;
  display: none;
}
.success-msg {
  background: rgba(0,212,148,0.08);
  border: 1px solid rgba(0,212,148,0.2);
  color: #00d494;
  padding: 0.75rem 1rem;
  border-radius: 0.75rem;
  font-size: 0.83rem;
  margin-bottom: 1rem;
  display: none;
}

.footer-link {
  text-align: center;
  margin-top: 1.25rem;
  font-size: 0.82rem;
  color: #8e9ab0;
}
.footer-link a { color: #00d494; text-decoration: none; }

.loading-text { display: none; }
.btn-main.loading .normal-text { display: none; }
.btn-main.loading .loading-text { display: inline; }

.screen { display: none; }
.screen.active { display: block; }

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // ── INIT ──
  var sb = supabase.createClient(
    'https://ovhezomrlrfajrmwbdya.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92aGV6b21ybHJmYWpybXdiZHlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NjM1MzEsImV4cCI6MjA4NzUzOTUzMX0.UTFUvtMKkyIIdJrc0GewWyTzAtONymUqZo_jJtT2ONI'
  );

  var selectedRole = 'driver';

  // Pre-select role and tab from URL ?role=
  var urlRole = new URLSearchParams(window.location.search).get('role');
  if (urlRole === 'host' || urlRole === 'driver') {
    selectedRole = urlRole;
    window.addEventListener('DOMContentLoaded', function() {
      showTab('signup');
      pickRole(urlRole);
    });
  }

  // ── REDIRECT AFTER LOGIN ──
  function goToApp(user) {
    var meta = (user && user.user_metadata) || {};
    var role = meta.role || selectedRole || 'driver';
    // Admin check
    var admins = ['hello@nestcharge.co.uk', 'admin@nestcharge.co.uk'];
    if (admins.indexOf(user.email) > -1) {
      window.location.replace('admin.html');
      return;
    }
    if (role === 'host') {
      window.location.replace('host-dashboard.html');
    } else {
      window.location.replace('bookings.html');
    }
  }

  // ── TAB SWITCHING ──
  function showTab(tab) {
    document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
    document.getElementById('tab-login').classList.remove('active');
    document.getElementById('tab-signup').classList.remove('active');
    clearMsgs();

    if (tab === 'login') {
      document.getElementById('screen-login').classList.add('active');
      document.getElementById('tab-login').classList.add('active');
    } else if (tab === 'signup') {
      document.getElementById('screen-signup').classList.add('active');
      document.getElementById('tab-signup').classList.add('active');
    } else if (tab === 'reset') {
      document.getElementById('screen-reset').classList.add('active');
    }
  }

  function pickRole(role) {
    selectedRole = role;
    document.getElementById('role-driver').classList.toggle('selected', role === 'driver');
    document.getElementById('role-host').classList.toggle('selected', role === 'host');
  }

  // ── LOGIN ──
  async function doLogin() {
    var email = document.getElementById('login-email').value.trim();
    var pass = document.getElementById('login-password').value;
    if (!email || !pass) { showError('Please enter your email and password.'); return; }

    var btn = document.getElementById('login-btn');
    btn.disabled = true; btn.classList.add('loading');
    clearMsgs();

    var result = await sb.auth.signInWithPassword({ email: email, password: pass });

    if (result.error) {
      showError(friendlyError(result.error.message));
      btn.disabled = false; btn.classList.remove('loading');
    } else {
      goToApp(result.data.user);
    }
  }

  // ── SIGNUP ──
  async function doSignup() {
    var name = document.getElementById('signup-name').value.trim();
    var email = document.getElementById('signup-email').value.trim();
    var pass = document.getElementById('signup-password').value;

    if (!name) { showError('Please enter your name.'); return; }
    if (!email) { showError('Please enter your email.'); return; }
    if (pass.length < 8) { showError('Password must be at least 8 characters.'); return; }

    var btn = document.getElementById('signup-btn');
    btn.disabled = true; btn.classList.add('loading');
    clearMsgs();

    var result = await sb.auth.signUp({
      email: email,
      password: pass,
      options: { data: { full_name: name, role: selectedRole } }
    });

    if (result.error) {
      showError(friendlyError(result.error.message));
      btn.disabled = false; btn.classList.remove('loading');
    } else if (result.data.user && !result.data.session) {
      showSuccess('✅ Check your email to confirm your account, then sign in.');
      btn.disabled = false; btn.classList.remove('loading');
    } else {
      goToApp(result.data.user);
    }
  }

  // ── GOOGLE ──
  async function doGoogle() {
    var dest = selectedRole === 'host' ? 'host-dashboard.html' : 'bookings.html';
    var result = await sb.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + '/' + dest }
    });
    if (result.error) showError(result.error.message);
  }

  // ── RESET ──
  async function doReset() {
    var email = document.getElementById('reset-email').value.trim();
    if (!email) { showError('Please enter your email.'); return; }
    var result = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/auth.html'
    });
    if (result.error) { showError(result.error.message); }
    else { showSuccess('✅ Reset link sent! Check your inbox.'); }
  }

  // ── HELPERS ──
  function showError(msg) {
    var el = document.getElementById('error-msg');
    el.textContent = msg; el.style.display = 'block';
    document.getElementById('success-msg').style.display = 'none';
  }
  function showSuccess(msg) {
    var el = document.getElementById('success-msg');
    el.textContent = msg; el.style.display = 'block';
    document.getElementById('error-msg').style.display = 'none';
  }
  function clearMsgs() {
    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('success-msg').style.display = 'none';
  }
  function friendlyError(msg) {
    if (!msg) return 'Something went wrong. Please try again.';
    if (msg.includes('Invalid login')) return 'Wrong email or password.';
    if (msg.includes('Email not confirmed')) return 'Please confirm your email first.';
    if (msg.includes('already registered')) return 'An account with this email already exists. Try signing in.';
    if (msg.includes('Password should')) return 'Password must be at least 8 characters.';
    return msg;
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', function(e) {
    if (e.key !== 'Enter') return;
    var active = document.querySelector('.screen.active');
    if (!active) return;
    if (active.id === 'screen-login') doLogin();
    else if (active.id === 'screen-signup') doSignup();
  });
</script>
